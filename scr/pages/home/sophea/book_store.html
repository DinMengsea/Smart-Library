    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #eef2f5;
            margin: 0;
        }

        /* The Rounded Square Frame */
        .icon-frame {
            position: relative;
            width: 85px;
            height: 85px;
            background: #F5FBFF;
            /* Elevation shadow */
            box-shadow: 3px 3px 4px rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            
            /* Layout Settings */
            display: flex;
            flex: none;
            order: 0;
            flex-grow: 0;
            overflow: hidden; /* Keeps the vector within the rounded bounds */
        }

        /* The Vector Styling */
        .abstract-vector {
            position: absolute;
            /* Figma Constraints */
            left: 7.67%;
            right: 7.69%;
            top: -0.03%;
            bottom: 0%;
            
            width: 84.64%; /* Calculated from constraints */
            height: 100.03%;
        }

        /* Applying the purple color from your spec */
        .abstract-vector path {
            fill: rgba(138, 53, 249, 0.83);
        }
    </style>
