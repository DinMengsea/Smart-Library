<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #eef2f5;
            margin: 0;
        }

        /* The 80px Circle */
        .icon-circle {
            width: 80px;
            height: 80px;
            background: #F5FBFF;
            box-shadow: 3px 3px 4px rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            
            /* This forces the SVG to the dead center */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Scaling the brain to fit nicely */
        .brain-vector {
            width: 50px; 
            height: 50px;
        }

        /* Applying the Red Stroke */
        .brain-vector path {
            stroke: #F84B4E;
            stroke-width: 1.2px; /* Slightly thinner so details don't blur */
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
    </style>
</head>
