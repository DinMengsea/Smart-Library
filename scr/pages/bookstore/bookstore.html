<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:title" content="Smart Library" />
  <meta property="og:description" content="Discover Smart Library where you can find the best books to read and learn." />
  <meta property="og:image" content="https://dinmengsea.github.io/Smart-Library/scr/assets/homepage/picture.png" />
  <meta property="og:url" content="https://dinmengsea.github.io/Smart-Library/" />
  <meta property="og:type" content="website" />

  <title>Smart Library</title>

  <link rel="stylesheet" href="../../components/navigationbar/navigationbar.css" />
  <link rel="icon" type="image/png" href="../../assets/logo/ourlogo.png">
  <link rel="stylesheet" href="../../components/footer/footer.css" />
  <link rel="stylesheet" href="bookstore.css" />
</head>

<body>
  <div id="header"></div>

  <main class="bookstore-page">
    <section class="filter-section">
      <div class="search-wrap">
        <img src="../../assets/icons/search.png" alt="Search" />
        <input id="searchInput" type="text" placeholder="Search for books..." />
      </div>

      <div class="filters">
        <select id="categoryFilter">
          <option value="all">Category</option>
          <option value="fiction">Fiction</option>
          <option value="self-help">Self Help</option>
          <option value="science">Science</option>
        </select>

        <select id="dateFilter">
          <option value="all">Date</option>
          <option value="new">New</option>
          <option value="old">Old</option>
        </select>

        <button id="myBookBtn" type="button">My Book</button>
      </div>
    </section>

    <section class="books-section">
      <h2 id="sectionTitle">All Books</h2>
      <div class="book-grid" id="bookGrid"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module">
    import { HeaderComponent } from "../../components/navigationbar/navigationbar.js";
    HeaderComponent("header");
  </script>

  <script src="../library/helper.js"></script>
  <script src="../../components/footer/footer.js"></script>
  <script>
    FooterComponent("footer");
  </script>

  <script src="bookstore.js"></script>
</body>
</html>
