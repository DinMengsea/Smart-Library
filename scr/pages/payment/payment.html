<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Payment | Smart Library</title>

  <link rel="stylesheet" href="../../components/navigationbar/navigationbar.css" />
  <link rel="stylesheet" href="../../components/footer/footer.css" />
  <link rel="stylesheet" href="payment.css" />
</head>

<body>
  
  <div id="header"></div>

  <main class="payment-page">
    <section class="payment-form">
      <h2>Payment Method</h2>

      <label>Cardholder Name</label>
      <input type="text" placeholder="Mengsea" />

      <div class="form-row">
        <div class="form-group">
          <label>Card Number</label>
          <input type="text" placeholder="1234 2345 5612 2321" />
        </div>

        <div class="form-group">
          <label>Expiration Date</label>
          <input type="text" placeholder="MM/YY" />
        </div>

        <div class="form-group">
          <label>Security Code</label>
          <input type="text" placeholder="***" />
        </div>
      </div>

      <h3>Billing Address</h3>

      <div class="form-row">
        <input type="text" placeholder="Country" />
        <input type="text" placeholder="City" />
      </div>

      <div class="form-row">
        <input type="text" placeholder="Address" />
        <input type="text" placeholder="Zip Code" />
      </div>

      <label class="checkbox">
        <input type="checkbox" />
        Save your payment method
      </label>
    </section>

    <aside class="summary">
      <h2>Order Summary</h2>
      <div class="summary-book">
        <img id="paymentBookImage" src="../../assets/book/book7.png" alt="Book" />

        <div>
          <h4 id="paymentBookTitle">This Story Might Save Your Life</h4>
          <p id="paymentBookDescription">
            A suspenseful podcast mystery that will keep you guessing.
          </p>
        </div>
      </div>

      <div class="price-row">
        <span>Subtotal</span>
        <strong>$24.99</strong>
      </div>

      <div class="price-row">
        <span>Tax</span>
        <strong>$0.00</strong>
      </div>

      <div class="price-row total">
        <span>Total</span>
        <strong>$24.99</strong>
      </div>

      <button class="buy-btn" type="button">Buy Now</button>
    </aside>
  </main>

  
  
  
  <script type="module">
    import { HeaderComponent } from "../../components/navigationbar/navigationbar.js";
    HeaderComponent("header");
    </script>
  <div id="footer"></div>
  <script src="../library/helper.js"></script>
  <script src="../../components/footer/footer.js"></script>
  <script>
    FooterComponent("footer");
  </script>
  <script src="payment.js"></script>
</body>
</html>
